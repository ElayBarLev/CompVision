<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Edge Detector — Person / Vehicle (on-device)</title>
  <!-- onnxruntime-web from CDN: no build step, no npm. -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #0b0d10; color: #e8eaed;
      font: 15px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    header { padding: 10px 14px; text-align: center; }
    header h1 { font-size: 17px; margin: 0; }
    header p { margin: 4px 0 0; font-size: 12px; color: #9aa0a6; }
    #stage { position: relative; width: 100%; max-width: 720px; }
    #view { width: 100%; display: block; border-radius: 12px; background: #000; }
    #overlay { position: absolute; inset: 0; width: 100%; height: 100%; }
    #status {
      margin: 8px 14px; padding: 8px 12px; border-radius: 8px;
      background: #15181d; font-size: 13px; min-height: 20px; text-align: center; width: calc(100% - 28px); max-width: 692px;
    }
    .controls { display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
      justify-content: center; padding: 8px 14px 24px; }
    .controls label { font-size: 13px; color: #c7cdd4; }
    button {
      background: #2a6df4; color: #fff; border: 0; border-radius: 8px;
      padding: 10px 16px; font-size: 15px; font-weight: 600;
    }
    .legend { display: inline-flex; gap: 12px; font-size: 12px; }
    .chip { display: inline-flex; align-items: center; gap: 5px; }
    .sw { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  </style>
</head>
<body>
  <header>
    <h1>Edge Detector — Person / Vehicle</h1>
    <p>Running fully on this device, in your browser (onnxruntime-web). No server.</p>
  </header>

  <div id="stage">
    <video id="view" playsinline muted autoplay></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="status">Tap “Start camera” to begin.</div>

  <div class="controls">
    <button id="start">Start camera</button>
    <label>score ≥ <span id="thrVal">0.50</span><br />
      <input id="thr" type="range" min="0.05" max="0.95" step="0.05" value="0.5" />
    </label>
    <span class="legend">
      <span class="chip"><span class="sw" style="background:#dc2828"></span>person</span>
      <span class="chip"><span class="sw" style="background:#2878dc"></span>vehicle</span>
    </span>
  </div>

  <script src="app.js"></script>
</body>
</html>
